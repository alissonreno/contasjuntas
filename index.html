<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6c5ce7">
    <title>ContasJuntas - Controle Financeiro do Casal</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #ff7675;
            --warning: #fdcb6e;
            --info: #74b9ff;
            --dark: #2d3436;
            --light: #f8f9fa;
            --gray: #636e72;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary: #a29bfe;
            --secondary: #6c5ce7;
            --success: #55efc4;
            --danger: #ff7675;
            --warning: #ffeaa7;
            --info: #74b9ff;
            --dark: #f8f9fa;
            --light: #2d3436;
            --gray: #b2bec3;
            --white: #1a1a2e;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            color: var(--dark);
            transition: var(--transition);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            background: var(--white);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle, .notifications-toggle {
            background: var(--light);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle:hover, .notifications-toggle:hover {
            transform: rotate(180deg);
            background: var(--primary);
            color: white;
        }

        .notifications-toggle:hover {
            transform: scale(1.1);
        }

        .badge-notification {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: var(--light);
            color: var(--dark);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .content {
            background: var(--white);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow-lg);
            min-height: 500px;
        }

        .tab-content {
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            background: var(--light);
            padding: 20px;
            border-radius: var(--radius);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        input, select, textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            transition: var(--transition);
            background: var(--white);
            color: var(--dark);
        }

        [data-theme="dark"] input,
        [data-theme="dark"] select,
        [data-theme="dark"] textarea {
            border-color: #444;
            background: #2d2d2d;
            color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9em;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: var(--dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.8em; }

        /* Cards de Contas */
        .accounts-list {
            display: grid;
            gap: 12px;
        }

        .account-card {
            background: var(--light);
            border: 2px solid transparent;
            border-radius: var(--radius);
            padding: 15px;
            transition: var(--transition);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .account-card:hover {
            border-color: var(--primary);
            transform: translateX(3px);
        }

        .account-card.paid {
            border-left: 4px solid var(--success);
            opacity: 0.8;
        }

        .account-card.overdue {
            border-left: 4px solid var(--danger);
            background: #fff5f5;
        }

        [data-theme="dark"] .account-card.overdue {
            background: #2d1f1f;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-fixed { background: #e8e5ff; color: var(--primary); }
        .badge-variable { background: #fff3e0; color: #f39c12; }
        .badge-recurring { background: #e0f7fa; color: #00acc1; }
        .badge-paid { background: #d4edda; color: #155724; }
        .badge-overdue { background: #f8d7da; color: #721c24; }

        /* Calendário */
        .calendar-container {
            background: var(--light);
            border-radius: var(--radius);
            padding: 15px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .weekday-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.8em;
            padding: 8px;
            color: var(--gray);
        }

        .calendar-day {
            background: var(--white);
            padding: 8px;
            border-radius: 8px;
            min-height: 70px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            font-size: 0.85em;
            position: relative;
        }

        .calendar-day:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, #667eea22, #764ba222);
            border-color: var(--primary);
        }

        .calendar-day.has-accounts {
            background: #ffeaa7;
        }

        [data-theme="dark"] .calendar-day.has-accounts {
            background: #2d3436;
            border-color: var(--warning);
        }

        .day-number {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .day-indicators {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .day-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* Planejamento */
        .plan-card {
            background: var(--light);
            border-radius: var(--radius);
            padding: 20px;
            margin: 15px 0;
            transition: var(--transition);
        }

        .plan-card.active-plan {
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .plan-progress {
            background: #e0e0e0;
            border-radius: 20px;
            height: 25px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #55efc4);
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8em;
        }

        .plan-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 15px 0;
        }

        .stat-card {
            background: var(--white);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary);
            margin: 8px 0;
        }

        .stat-label {
            font-size: 0.8em;
            color: var(--gray);
        }

        /* Timeline do planejamento */
        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--primary);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--white);
            border-radius: 8px;
            border-left: 3px solid var(--success);
        }

        .timeline-item::before {
            content: '💵';
            position: absolute;
            left: -35px;
            top: 15px;
            background: var(--white);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 25px;
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--gray);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: #ffe0e0;
            color: var(--danger);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--white);
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 350px;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Mobile Navigation */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .mobile-nav .tabs {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .mobile-nav .tab-btn {
            flex-direction: column;
            padding: 8px;
            font-size: 0.7em;
            gap: 4px;
            background: none;
            color: var(--gray);
        }

        .mobile-nav .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .mobile-nav .tab-icon {
            font-size: 1.5em;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 500;
            transition: var(--transition);
            display: none;
        }

        .fab:hover { transform: scale(1.1); }
        .fab:active { transform: scale(0.9); }

        /* Responsividade */
        @media (max-width: 768px) {
            .header .tabs { display: none; }
            .mobile-nav { display: block; }
            .fab { display: flex; align-items: center; justify-content: center; }
            .content { padding: 15px; border-radius: 20px 20px 0 0; }
            .form-grid { grid-template-columns: 1fr; }
            .account-card { grid-template-columns: 1fr; }
            .calendar-day { min-height: 50px; padding: 5px; font-size: 0.75em; }
            .plan-stats { grid-template-columns: 1fr; }
            .btn { padding: 8px 16px; font-size: 0.85em; }
        }

        @media (min-width: 769px) {
            .mobile-nav, .fab { display: none; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--light); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💑 ContasJuntas</div>
            <div class="tabs" id="desktopTabs">
                <button class="tab-btn active" onclick="switchTab('accounts')">📋 Contas</button>
                <button class="tab-btn" onclick="switchTab('calendar')">📅 Calendário</button>
                <button class="tab-btn" onclick="switchTab('plan')">🎯 Planejamento</button>
                <button class="tab-btn" onclick="switchTab('summary')">📊 Resumo</button>
                <button class="tab-btn" onclick="switchTab('goals')">🏆 Metas</button>
            </div>
            <div class="header-actions">
                <button class="notifications-toggle" onclick="checkNotifications()" style="position:relative;">
                    🔔
                    <span class="badge-notification" id="notificationBadge" style="display:none;">0</span>
                </button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
            </div>
        </div>

        <div class="content">
            <!-- Aba de Contas -->
            <div id="accounts-tab" class="tab-content active">
                <h2>💰 Gerenciamento de Contas</h2>
                
                <div style="display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap;">
                    <input type="text" id="searchAccounts" placeholder="🔍 Buscar contas..." 
                           style="flex:1;min-width:200px;" oninput="renderAccounts()">
                    <select id="filterCategory" onchange="renderAccounts()">
                        <option value="all">Todas categorias</option>
                        <option value="fixa">Fixas</option>
                        <option value="variavel">Variáveis</option>
                        <option value="cartao">Cartão</option>
                        <option value="outros">Outros</option>
                    </select>
                    <select id="filterStatus" onchange="renderAccounts()">
                        <option value="all">Todos status</option>
                        <option value="paid">Pagas</option>
                        <option value="pending">Pendentes</option>
                        <option value="overdue">Vencidas</option>
                    </select>
                    <select id="filterMonth" onchange="renderAccounts()">
                        <option value="all">Todos meses</option>
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>📝 Nome</label>
                        <input type="text" id="accountName" placeholder="Ex: Aluguel">
                    </div>
                    <div class="form-group">
                        <label>💵 Valor</label>
                        <input type="number" id="accountAmount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>📅 Vencimento</label>
                        <input type="date" id="accountDate">
                    </div>
                    <div class="form-group">
                        <label>🏷 Categoria</label>
                        <select id="accountCategory">
                            <option value="fixa">Fixa (recorrente)</option>
                            <option value="variavel">Variável</option>
                            <option value="cartao">Cartão</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>💬 Obs</label>
                        <input type="text" id="accountObs" placeholder="Opcional">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="addAccount()">➕ Adicionar</button>
                    <button class="btn btn-info" onclick="generateFixedAccounts()">🔄 Gerar Recorrentes</button>
                    <button class="btn btn-warning" onclick="checkOverdueAccounts()">⚠ Verificar Vencidas</button>
                </div>
                
                <div class="accounts-list" id="accountsList"></div>
            </div>

            <!-- Aba do Calendário -->
            <div id="calendar-tab" class="tab-content">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <h2>📅 Calendário Financeiro</h2>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <button class="btn btn-warning btn-sm" onclick="changeMonth(-1)">◀</button>
                            <span class="month-title" id="currentMonth" style="font-weight: bold; font-size: 1.2em;"></span>
                            <button class="btn btn-warning btn-sm" onclick="changeMonth(1)">▶</button>
                            <button class="btn btn-info btn-sm" onclick="goToToday()">Hoje</button>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <!-- Aba de Planejamento -->
            <div id="plan-tab" class="tab-content">
                <h2>🎯 Planejamento Financeiro Avançado</h2>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>🎯 Nome do Objetivo</label>
                        <input type="text" id="planName" placeholder="Ex: Viagem, Carro, Reserva...">
                    </div>
                    <div class="form-group">
                        <label>💰 Valor Total</label>
                        <input type="number" id="planGoal" placeholder="10000" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>📅 Data Início</label>
                        <input type="date" id="planStartDate">
                    </div>
                    <div class="form-group">
                        <label>🎯 Data Alvo</label>
                        <input type="date" id="planEndDate">
                    </div>
                    <div class="form-group">
                        <label>📆 Ou defina em meses</label>
                        <input type="number" id="planMonths" placeholder="Ex: 12 meses">
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="createPlan()">📊 Criar Plano</button>
                <button class="btn btn-success" onclick="showDepositForm()" style="margin-left:10px;">💵 Registrar Depósito</button>
                
                <div id="activePlan" style="margin-top: 20px;"></div>
                <div id="plansHistory" style="margin-top: 30px;"></div>
            </div>

            <!-- Aba de Metas -->
            <div id="goals-tab" class="tab-content">
                <h2>🏆 Metas e Conquistas</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>🏆 Meta</label>
                        <input type="text" id="goalName" placeholder="Ex: Quitar dívidas">
                    </div>
                    <div class="form-group">
                        <label>📅 Prazo</label>
                        <input type="date" id="goalDeadline">
                    </div>
                    <div class="form-group">
                        <label>📊 Progresso (%)</label>
                        <input type="range" id="goalProgress" min="0" max="100" value="0" oninput="document.getElementById('progressValue').textContent = this.value + '%'">
                        <span id="progressValue">0%</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addGoal()">➕ Adicionar Meta</button>
                <div id="goalsList" style="margin-top: 20px; display: grid; gap: 15px;"></div>
            </div>

            <!-- Aba de Resumo -->
            <div id="summary-tab" class="tab-content">
                <h2>📊 Resumo Financeiro</h2>
                <div id="summaryCards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 20px 0;"></div>
                <div id="categorySummary"></div>
                <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-danger" onclick="exportData()">📥 Exportar Backup</button>
                    <button class="btn btn-warning" onclick="importData()">📤 Importar Backup</button>
                    <button class="btn btn-info" onclick="shareData()">🔗 Compartilhar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('accounts')">
                <span class="tab-icon">📋</span> Contas
            </button>
            <button class="tab-btn" onclick="switchTab('calendar')">
                <span class="tab-icon">📅</span> Calendário
            </button>
            <button class="tab-btn" onclick="switchTab('plan')">
                <span class="tab-icon">🎯</span> Planejar
            </button>
            <button class="tab-btn" onclick="switchTab('goals')">
                <span class="tab-icon">🏆</span> Metas
            </button>
            <button class="tab-btn" onclick="switchTab('summary')">
                <span class="tab-icon">📊</span> Resumo
            </button>
        </div>
    </nav>

    <!-- FAB -->
    <button class="fab" onclick="quickAdd()">+</button>

    <!-- Modal de Depósito -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💵 Registrar Depósito</h3>
                <button class="close-btn" onclick="closeDepositModal()">✖</button>
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Valor do Depósito</label>
                <input type="number" id="depositAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Data</label>
                <input type="date" id="depositDate">
            </div>
            <div class="form-group" style="margin-bottom:15px;">
                <label>Descrição</label>
                <input type="text" id="depositDescription" placeholder="Ex: Economia do mês">
            </div>
            <button class="btn btn-success" onclick="addDeposit()">✅ Confirmar Depósito</button>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div id="accountModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalhes</h3>
                <button class="close-btn" onclick="closeModal()">✖</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // Dados
        let accounts = JSON.parse(localStorage.getItem('contasJuntas_accounts')) || [];
        let plans = JSON.parse(localStorage.getItem('contasJuntas_plans')) || [];
        let goals = JSON.parse(localStorage.getItem('contasJuntas_goals')) || [];
        let currentTheme = localStorage.getItem('contasJuntas_theme') || 'light';
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        // Init
        function init() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon();
            document.getElementById('accountDate').value = currentDate.toISOString().split('T')[0];
            document.getElementById('planStartDate').value = currentDate.toISOString().split('T')[0];
            document.getElementById('depositDate').value = currentDate.toISOString().split('T')[0];
            
            updateMonthFilter();
            renderAccounts();
            renderCalendar();
            renderPlans();
            renderGoals();
            checkNotifications();
            checkOverdueAccounts();
            
            if (window.innerWidth <= 768) {
                document.querySelector('.fab').style.display = 'flex';
            }
        }

        // Tema
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('contasJuntas_theme', currentTheme);
            updateThemeIcon();
            renderCalendar();
        }

        function updateThemeIcon() {
            document.getElementById('themeToggle').textContent = currentTheme === 'light' ? '🌙' : '☀️';
        }

        // Navegação
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const tabContent = document.getElementById(`${tabName}-tab`);
            if (tabContent) tabContent.classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.textContent.includes(getTabEmoji(tabName))) {
                    btn.classList.add('active');
                }
            });
            
            if (tabName === 'calendar') renderCalendar();
            if (tabName === 'plan') renderPlans();
            if (tabName === 'accounts') { renderAccounts(); updateMonthFilter(); }
            if (tabName === 'summary') renderSummary();
            if (tabName === 'goals') renderGoals();
        }

        function getTabEmoji(tabName) {
            const emojis = { accounts: '📋', calendar: '📅', plan: '🎯', summary: '📊', goals: '🏆' };
            return emojis[tabName] || '';
        }

        // Contas
        function addAccount() {
            const name = document.getElementById('accountName').value.trim();
            const amount = parseFloat(document.getElementById('accountAmount').value);
            const date = document.getElementById('accountDate').value;
            const category = document.getElementById('accountCategory').value;
            const obs = document.getElementById('accountObs').value.trim();

            if (!name || !amount || !date) {
                showToast('❌ Preencha todos os campos!');
                return;
            }

            const account = {
                id: Date.now(),
                name, amount, date, category, obs,
                paid: false,
                paidDate: null,
                isRecurring: category === 'fixa',
                parentId: null
            };

            accounts.push(account);
            
            if (category === 'fixa') generateRecurringForAccount(account);
            
            saveData();
            renderAccounts();
            updateMonthFilter();
            clearForm();
            showToast('✅ Conta adicionada!');
        }

        function generateRecurringForAccount(baseAccount) {
            const baseDate = new Date(baseAccount.date + 'T00:00:00');
            
            for (let i = 1; i <= 12; i++) {
                const nextDate = new Date(baseDate);
                nextDate.setMonth(baseDate.getMonth() + i);
                const dateStr = nextDate.toISOString().split('T')[0];
                
                if (!accounts.some(acc => acc.name === baseAccount.name && acc.date === dateStr)) {
                    accounts.push({
                        ...baseAccount,
                        id: Date.now() + Math.random(),
                        date: dateStr,
                        paid: false,
                        paidDate: null,
                        parentId: baseAccount.id
                    });
                }
            }
            saveData();
        }

        function generateFixedAccounts() {
            const fixedAccounts = accounts.filter(acc => acc.isRecurring && !acc.parentId);
            let count = 0;
            
            fixedAccounts.forEach(acc => {
                const before = accounts.length;
                generateRecurringForAccount(acc);
                count += accounts.length - before;
            });
            
            showToast(count > 0 ? `✅ ${count} contas geradas!` : '📋 Contas já estão em dia!');
            renderAccounts();
            updateMonthFilter();
        }

        function togglePaid(id) {
            const account = accounts.find(acc => acc.id === id);
            if (!account) return;
            
            account.paid = !account.paid;
            account.paidDate = account.paid ? new Date().toISOString() : null;
            
            if (account.paid && account.parentId) {
                const futureUnpaid = accounts.filter(acc => 
                    acc.parentId === account.parentId && 
                    new Date(acc.date) > new Date(account.date) &&
                    !acc.paid
                );
                
                if (futureUnpaid.length > 0 && confirm(`Marcar também as ${futureUnpaid.length} contas futuras como pagas?`)) {
                    futureUnpaid.forEach(acc => {
                        acc.paid = true;
                        acc.paidDate = new Date().toISOString();
                    });
                }
            }
            
            saveData();
            renderAccounts();
            renderCalendar();
            checkNotifications();
            showToast(account.paid ? '✅ Paga!' : '🔄 Pendente!');
        }

        function deleteAccount(id) {
            const account = accounts.find(acc => acc.id === id);
            if (!account) return;
            
            if (confirm('Excluir esta conta?')) {
                if (account.isRecurring && !account.parentId && 
                    confirm('Conta fixa. Excluir também as recorrências?')) {
                    accounts = accounts.filter(acc => acc.id !== id && acc.parentId !== id);
                } else {
                    accounts = accounts.filter(acc => acc.id !== id);
                }
                
                saveData();
                renderAccounts();
                renderCalendar();
                updateMonthFilter();
                showToast('🗑 Excluída!');
            }
        }

        function checkOverdueAccounts() {
            const today = new Date().toISOString().split('T')[0];
            const overdue = accounts.filter(acc => !acc.paid && acc.date < today);
            
            if (overdue.length > 0) {
                showToast(`⚠ ${overdue.length} conta(s) vencida(s)! Verifique na lista.`);
            } else {
                showToast('✅ Nenhuma conta vencida!');
            }
            
            renderAccounts();
        }

        function renderAccounts() {
            const list = document.getElementById('accountsList');
            const search = (document.getElementById('searchAccounts')?.value || '').toLowerCase();
            const catFilter = document.getElementById('filterCategory')?.value || 'all';
            const statusFilter = document.getElementById('filterStatus')?.value || 'all';
            const monthFilter = document.getElementById('filterMonth')?.value || 'all';
            const today = new Date().toISOString().split('T')[0];
            
            let filtered = accounts.filter(acc => {
                if (search && !acc.name.toLowerCase().includes(search) && 
                    !acc.obs.toLowerCase().includes(search)) return false;
                if (catFilter !== 'all' && acc.category !== catFilter) return false;
                if (statusFilter === 'paid' && !acc.paid) return false;
                if (statusFilter === 'pending' && acc.paid) return false;
                if (statusFilter === 'overdue' && (acc.paid || acc.date >= today)) return false;
                if (monthFilter !== 'all' && !acc.date.startsWith(monthFilter)) return false;
                return true;
            });
            
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);"><div style="font-size:3em;">📋</div><h3>Nenhuma conta</h3></div>';
                return;
            }
            
            list.innerHTML = filtered.map(acc => {
                const isOverdue = !acc.paid && acc.date < today;
                return `
                    <div class="account-card ${acc.paid ? 'paid' : ''} ${isOverdue ? 'overdue' : ''} ${acc.isRecurring ? 'fixed' : ''}">
                        <div>
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;">
                                <strong>${acc.name}</strong>
                                <span class="badge badge-${acc.category}">${acc.category}</span>
                                ${acc.isRecurring ? '<span class="badge badge-recurring">🔄</span>' : ''}
                                ${acc.paid ? '<span class="badge badge-paid">✅</span>' : ''}
                                ${isOverdue ? '<span class="badge badge-overdue">⚠ Vencida</span>' : ''}
                            </div>
                            <div style="font-size:0.85em;color:var(--gray);">
                                📅 ${formatDate(acc.date)}
                                ${acc.obs ? ` • 💬 ${acc.obs}` : ''}
                                ${acc.paidDate ? ` • ✅ ${formatDate(acc.paidDate)}` : ''}
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:1.2em;font-weight:bold;color:var(--primary);">R$ ${acc.amount.toFixed(2)}</div>
                            <div style="margin-top:8px;display:flex;gap:6px;">
                                <button class="btn btn-success btn-sm" onclick="togglePaid(${acc.id})">${acc.paid ? '✅' : '○'}</button>
                                <button class="btn btn-warning btn-sm" onclick="openAccountModal(${acc.id})">ℹ</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteAccount(${acc.id})">🗑</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateMonthFilter() {
            const select = document.getElementById('filterMonth');
            if (!select) return;
            
            const months = [...new Set(accounts.map(acc => acc.date.substring(0, 7)))].sort();
            select.innerHTML = '<option value="all">Todos meses</option>' + 
                months.map(m => {
                    const [y, mo] = m.split('-');
                    return `<option value="${m}">${['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(mo)]} ${y}</option>`;
                }).join('');
        }

        // Calendário
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function goToToday() {
            currentMonth = currentDate.getMonth();
            currentYear = currentDate.getFullYear();
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                           'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            const weekDays = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
            
            document.getElementById('currentMonth').textContent = `${months[currentMonth]} ${currentYear}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            let html = weekDays.map(d => `<div class="weekday-header">${d}</div>`).join('');
            
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day"></div>';
            
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayAccounts = accounts.filter(acc => acc.date === date);
                const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${dayAccounts.length > 0 ? 'has-accounts' : ''}"
                         onclick="showDayAccounts('${date}')">
                        <div class="day-number">${day}</div>
                        ${dayAccounts.length > 0 ? `
                            <div class="day-indicators">
                                ${dayAccounts.filter(a=>a.paid).length > 0 ? `<span class="day-dot" style="background:var(--success);"></span>` : ''}
                                ${dayAccounts.filter(a=>!a.paid).length > 0 ? `<span class="day-dot" style="background:var(--danger);"></span>` : ''}
                                <small>${dayAccounts.length}</small>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        function showDayAccounts(date) {
            const dayAccounts = accounts.filter(acc => acc.date === date);
            if (!dayAccounts.length) {
                showToast('Nenhuma conta neste dia');
                return;
            }
            
            document.getElementById('modalTitle').textContent = formatDate(date);
            document.getElementById('modalContent').innerHTML = dayAccounts.map(acc => `
                <div style="padding:12px;background:var(--light);border-radius:8px;margin:8px 0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <strong>${acc.name}</strong>
                        <span>R$ ${acc.amount.toFixed(2)}</span>
                    </div>
                    <div style="margin-top:8px;display:flex;gap:6px;">
                        <button class="btn btn-success btn-sm" onclick="togglePaid(${acc.id});closeModal();">${acc.paid ? '✅' : '○'}</button>
                        <button class="btn btn-info btn-sm" onclick="openAccountModal(${acc.id})">ℹ</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('accountModal').classList.add('show');
        }

        // Planejamento Financeiro Avançado
        function createPlan() {
            const name = document.getElementById('planName').value.trim();
            const goal = parseFloat(document.getElementById('planGoal').value);
            const startDate = document.getElementById('planStartDate').value;
            let endDate = document.getElementById('planEndDate').value;
            const months = parseInt(document.getElementById('planMonths').value);

            if (!name || !goal || !startDate) {
                showToast('❌ Preencha nome, valor e data inicial!');
                return;
            }

            if (!endDate && !months) {
                showToast('❌ Informe a data alvo ou quantidade de meses!');
                return;
            }

            if (!endDate && months) {
                const start = new Date(startDate + 'T00:00:00');
                start.setMonth(start.getMonth() + months);
                endDate = start.toISOString().split('T')[0];
            }

            const plan = {
                id: Date.now(),
                name,
                goal,
                startDate,
                endDate,
                saved: 0,
                deposits: [],
                completed: false
            };

            plans.push(plan);
            saveData();
            renderPlans();
            clearPlanForm();
            showToast('✅ Plano criado com sucesso!');
        }

        function showDepositForm() {
            if (plans.length === 0) {
                showToast('❌ Crie um plano primeiro!');
                return;
            }
            document.getElementById('depositModal').classList.add('show');
        }

        function closeDepositModal() {
            document.getElementById('depositModal').classList.remove('show');
        }

        function addDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const date = document.getElementById('depositDate').value;
            const description = document.getElementById('depositDescription').value.trim();

            if (!amount || !date) {
                showToast('❌ Preencha valor e data!');
                return;
            }

            const activePlan = plans.find(p => !p.completed);
            if (!activePlan) {
                showToast('❌ Nenhum plano ativo!');
                return;
            }

            activePlan.saved += amount;
            activePlan.deposits.push({ amount, date, description: description || 'Depósito' });

            if (activePlan.saved >= activePlan.goal) {
                activePlan.completed = true;
                showToast('🎉 Parabéns! Meta alcançada!');
            }

            document.getElementById('depositAmount').value = '';
            document.getElementById('depositDescription').value = '';
            document.getElementById('depositDate').value = currentDate.toISOString().split('T')[0];
            
            saveData();
            renderPlans();
            closeDepositModal();
            showToast(`💵 Depositado R$ ${amount.toFixed(2)}!`);
        }

        function deleteDeposit(planId, depositIndex) {
            if (confirm('Excluir este depósito?')) {
                const plan = plans.find(p => p.id === planId);
                if (plan) {
                    plan.saved -= plan.deposits[depositIndex].amount;
                    plan.deposits.splice(depositIndex, 1);
                    plan.completed = false;
                    saveData();
                    renderPlans();
                    showToast('🗑 Depósito excluído!');
                }
            }
        }

        function deletePlan(planId) {
            if (confirm('Excluir este planejamento?')) {
                plans = plans.filter(p => p.id !== planId);
                saveData();
                renderPlans();
                showToast('🗑 Plano excluído!');
            }
        }

        function renderPlans() {
            const container = document.getElementById('activePlan');
            const historyContainer = document.getElementById('plansHistory');
            
            const activePlans = plans.filter(p => !p.completed);
            const completedPlans = plans.filter(p => p.completed);

            if (activePlans.length === 0 && completedPlans.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);"><div style="font-size:3em;">🎯</div><h3>Sem planejamentos</h3><p>Crie seu primeiro plano financeiro!</p></div>';
                historyContainer.innerHTML = '';
                return;
            }

            container.innerHTML = activePlans.map(plan => renderPlanCard(plan)).join('');
            
            if (completedPlans.length > 0) {
                historyContainer.innerHTML = '<h3>🏆 Planos Completos</h3>' + 
                    completedPlans.map(plan => renderPlanCard(plan)).join('');
            }
        }

        function renderPlanCard(plan) {
            const start = new Date(plan.startDate + 'T00:00:00');
            const end = new Date(plan.endDate + 'T00:00:00');
            const today = new Date();
            const totalDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            const daysPassed = Math.ceil((today - start) / (1000 * 60 * 60 * 24));
            const daysRemaining = Math.max(0, totalDays - daysPassed);
            const monthsRemaining = daysRemaining / 30;
            const remaining = Math.max(0, plan.goal - plan.saved);
            const monthlyNeeded = monthsRemaining > 0 ? remaining / monthsRemaining : remaining;
            const weeklyNeeded = monthlyNeeded / 4;
            const progress = Math.min((plan.saved / plan.goal) * 100, 100);
            const idealProgress = totalDays > 0 ? (daysPassed / totalDays) * 100 : 0;
            const isOnTrack = progress >= idealProgress;

            return `
                <div class="plan-card active-plan">
                    <div class="plan-header">
                        <h3>${plan.name} ${plan.completed ? '🏆' : ''}</h3>
                        <div>
                            <span class="badge ${isOnTrack ? 'badge-paid' : 'badge-overdue'}">
                                ${isOnTrack ? '✅ No prazo' : '⚠ Atrasado'}
                            </span>
                            ${!plan.completed ? `<button class="btn btn-danger btn-sm" onclick="deletePlan(${plan.id})">🗑</button>` : ''}
                        </div>
                    </div>
                    
                    <div class="plan-stats">
                        <div class="stat-card">
                            <div class="stat-label">💰 Objetivo</div>
                            <div class="stat-value">R$ ${plan.goal.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">💵 Guardado</div>
                            <div class="stat-value" style="color:var(--success);">R$ ${plan.saved.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📊 Restante</div>
                            <div class="stat-value" style="color:var(--danger);">R$ ${remaining.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📅 Mensal</div>
                            <div class="stat-value">R$ ${monthlyNeeded.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📆 Semanal</div>
                            <div class="stat-value">R$ ${weeklyNeeded.toFixed(2)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">⏳ Dias restantes</div>
                            <div class="stat-value">${daysRemaining}</div>
                        </div>
                    </div>
                    
                    <div class="plan-progress">
                        <div class="progress-fill" style="width:${progress}%">
                            ${progress.toFixed(1)}%
                        </div>
                    </div>
                    
                    <div style="margin-top:15px;">
                        <small>
                            📅 De ${formatDate(plan.startDate)} até ${formatDate(plan.endDate)}
                            ${!plan.completed ? ` • Ideal: ${idealProgress.toFixed(1)}%` : ''}
                        </small>
                    </div>
                    
                    ${plan.deposits.length > 0 ? `
                        <div style="margin-top:15px;">
                            <strong>📋 Depósitos:</strong>
                            ${plan.deposits.map((dep, i) => `
                                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--white);border-radius:6px;margin:4px 0;">
                                    <div>
                                        <div>${dep.description}</div>
                                        <small style="color:var(--gray);">${formatDate(dep.date)}</small>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <span style="color:var(--success);font-weight:bold;">+R$ ${dep.amount.toFixed(2)}</span>
                                        ${!plan.completed ? `<button class="btn btn-danger btn-sm" onclick="deleteDeposit(${plan.id}, ${i})">🗑</button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p style="color:var(--gray);margin-top:15px;">Nenhum depósito ainda</p>'}
                </div>
            `;
        }

        // Metas
        function addGoal() {
            const name = document.getElementById('goalName').value.trim();
            const deadline = document.getElementById('goalDeadline').value;
            const progress = parseInt(document.getElementById('goalProgress').value);

            if (!name) {
                showToast('❌ Informe o nome da meta!');
                return;
            }

            goals.push({
                id: Date.now(),
                name,
                deadline,
                progress,
                createdAt: new Date().toISOString()
            });

            saveData();
            renderGoals();
            document.getElementById('goalName').value = '';
            document.getElementById('goalProgress').value = 0;
            document.getElementById('progressValue').textContent = '0%';
            showToast('✅ Meta adicionada!');
        }

        function updateGoalProgress(id) {
            const goal = goals.find(g => g.id === id);
            if (!goal) return;
            
            const newProgress = prompt('Atualizar progresso (0-100):', goal.progress);
            if (newProgress !== null) {
                goal.progress = Math.min(100, Math.max(0, parseInt(newProgress) || 0));
                saveData();
                renderGoals();
                showToast('📊 Progresso atualizado!');
            }
        }

        function deleteGoal(id) {
            if (confirm('Excluir esta meta?')) {
                goals = goals.filter(g => g.id !== id);
                saveData();
                renderGoals();
                showToast('🗑 Meta excluída!');
            }
        }

        function renderGoals() {
            const container = document.getElementById('goalsList');
            
            if (goals.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);"><div style="font-size:3em;">🏆</div><h3>Sem metas</h3><p>Defina suas metas financeiras!</p></div>';
                return;
            }

            container.innerHTML = goals.map(goal => `
                <div style="background:var(--light);padding:20px;border-radius:var(--radius);">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                        <h3>${goal.name}</h3>
                        <div>
                            <button class="btn btn-warning btn-sm" onclick="updateGoalProgress(${goal.id})">📊</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteGoal(${goal.id})">🗑</button>
                        </div>
                    </div>
                    <div class="plan-progress">
                        <div class="progress-fill" style="width:${goal.progress}%">${goal.progress}%</div>
                    </div>
                    ${goal.deadline ? `<small style="color:var(--gray);">📅 Prazo: ${formatDate(goal.deadline)}</small>` : ''}
                    <small style="color:var(--gray);display:block;">📅 Criada em: ${formatDate(goal.createdAt)}</small>
                </div>
            `).join('');
        }

        // Resumo
        function renderSummary() {
            const total = accounts.reduce((s, a) => s + a.amount, 0);
            const paid = accounts.filter(a => a.paid).reduce((s, a) => s + a.amount, 0);
            const pending = total - paid;
            const overdue = accounts.filter(a => !a.paid && a.date < new Date().toISOString().split('T')[0]).length;
            
            document.getElementById('summaryCards').innerHTML = `
                <div class="stat-card"><div>📋 Total</div><div class="stat-value">${accounts.length}</div></div>
                <div class="stat-card"><div>✅ Pagas</div><div class="stat-value" style="color:var(--success);">R$ ${paid.toFixed(2)}</div></div>
                <div class="stat-card"><div>❌ Pendentes</div><div class="stat-value" style="color:var(--danger);">R$ ${pending.toFixed(2)}</div></div>
                <div class="stat-card"><div>⚠ Vencidas</div><div class="stat-value" style="color:var(--danger);">${overdue}</div></div>
                <div class="stat-card"><div>💰 Total</div><div class="stat-value">R$ ${total.toFixed(2)}</div></div>
            `;
            
            const categories = {fixa:'Fixas', variavel:'Variáveis', cartao:'Cartão', outros:'Outros'};
            document.getElementById('categorySummary').innerHTML = Object.entries(categories).map(([key, name]) => {
                const catAccs = accounts.filter(a => a.category === key);
                if (!catAccs.length) return '';
                const catTotal = catAccs.reduce((s, a) => s + a.amount, 0);
                return `
                    <div style="padding:12px;background:var(--light);border-radius:8px;margin:8px 0;display:flex;justify-content:space-between;">
                        <strong>${name} (${catAccs.length})</strong>
                        <span>R$ ${catTotal.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
        }

        // Notificações
        function checkNotifications() {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            
            const overdue = accounts.filter(acc => !acc.paid && acc.date < today).length;
            const dueToday = accounts.filter(acc => !acc.paid && acc.date === today).length;
            const dueTomorrow = accounts.filter(acc => !acc.paid && acc.date === tomorrow).length;
            
            const total = overdue + dueToday + dueTomorrow;
            const badge = document.getElementById('notificationBadge');
            
            if (total > 0) {
                badge.style.display = 'flex';
                badge.textContent = total;
                if (overdue > 0) showToast(`⚠ ${overdue} conta(s) vencida(s)!`);
            } else {
                badge.style.display = 'none';
            }
        }

        // Modal
        function openAccountModal(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            
            document.getElementById('modalTitle').textContent = acc.name;
            document.getElementById('modalContent').innerHTML = `
                <div style="margin-bottom:15px;">
                    <span class="badge badge-${acc.category}">${acc.category}</span>
                    ${acc.isRecurring ? '<span class="badge badge-recurring">Recorrente</span>' : ''}
                    ${acc.paid ? '<span class="badge badge-paid">Pago</span>' : ''}
                </div>
                <p><strong>💰 Valor:</strong> R$ ${acc.amount.toFixed(2)}</p>
                <p><strong>📅 Vencimento:</strong> ${formatDate(acc.date)}</p>
                <p><strong>💬 Obs:</strong> ${acc.obs || 'Nenhuma'}</p>
                ${acc.paidDate ? `<p><strong>✅ Pago em:</strong> ${formatDate(acc.paidDate)}</p>` : ''}
                <div style="margin-top:20px;display:flex;gap:8px;">
                    <button class="btn btn-success" onclick="togglePaid(${acc.id});closeModal();">
                        ${acc.paid ? '🔄 Desmarcar' : '✅ Marcar Pago'}
                    </button>
                    <button class="btn btn-danger" onclick="deleteAccount(${acc.id});closeModal();">🗑 Excluir</button>
                </div>
            `;
            document.getElementById('accountModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('accountModal').classList.remove('show');
        }

        // Export/Import
        function exportData() {
            const data = { accounts, plans, goals, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `contasjuntas_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('📥 Backup exportado!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.accounts) accounts = data.accounts;
                        if (data.plans) plans = data.plans;
                        if (data.goals) goals = data.goals;
                        saveData();
                        renderAccounts();
                        renderCalendar();
                        renderPlans();
                        renderGoals();
                        updateMonthFilter();
                        showToast('📤 Dados importados!');
                    } catch (err) {
                        showToast('❌ Arquivo inválido!');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function shareData() {
            const data = JSON.stringify({ accounts, plans, goals });
            if (navigator.share) {
                navigator.share({
                    title: 'ContasJuntas - Backup',
                    text: 'Backup dos dados do ContasJuntas',
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(data).then(() => {
                    showToast('📋 Dados copiados!');
                });
            }
        }

        // Utilitários
        function saveData() {
            localStorage.setItem('contasJuntas_accounts', JSON.stringify(accounts));
            localStorage.setItem('contasJuntas_plans', JSON.stringify(plans));
            localStorage.setItem('contasJuntas_goals', JSON.stringify(goals));
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        function clearForm() {
            document.getElementById('accountName').value = '';
            document.getElementById('accountAmount').value = '';
            document.getElementById('accountObs').value = '';
            document.getElementById('accountDate').value = currentDate.toISOString().split('T')[0];
        }

        function clearPlanForm() {
            document.getElementById('planName').value = '';
            document.getElementById('planGoal').value = '';
            document.getElementById('planEndDate').value = '';
            document.getElementById('planMonths').value = '';
            document.getElementById('planStartDate').value = currentDate.toISOString().split('T')[0];
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function quickAdd() {
            switchTab('accounts');
            document.getElementById('accountName').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Events
        window.onclick = (e) => {
            if (e.target === document.getElementById('accountModal')) closeModal();
            if (e.target === document.getElementById('depositModal')) closeDepositModal();
        };
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeDepositModal();
            }
        });
        
        window.addEventListener('resize', () => {
            document.querySelector('.fab').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
        });

        init();
    </script>
</body>
</html>
